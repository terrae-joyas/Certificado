<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al taller — Terrae</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,500&family=Jost:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-pagina="login">
  <a class="saltar-contenido" href="#contenido-login">Saltar al contenido principal</a>

  <main class="login-pantalla" id="contenido-login">
    <div class="login-caja">
      <img class="login-caja__logo" src="assets/logo/terrae-isotipo-oro-negro.jpg" alt="Terrae">
      <h1 class="login-caja__titulo">Acceso al taller</h1>
      <p class="login-caja__subtitulo">Panel para operadores, auditores y administradores.</p>

      <form data-form="login" novalidate>
        <div class="campo">
          <label class="campo__label" for="email">Correo electrónico</label>
          <input class="campo__input" id="email" name="email" type="email" autocomplete="username" required>
        </div>
        <div class="campo">
          <label class="campo__label" for="password">Contraseña</label>
          <input class="campo__input" id="password" name="password" type="password" autocomplete="current-password" required minlength="8">
        </div>

        <p class="campo__error" data-login-error hidden role="alert"></p>

        <button class="boton boton--primario login-caja__submit" type="submit">Ingresar</button>
      </form>

      <p class="login-caja__aviso">Acceso exclusivo para personal autorizado de EmJoy SAS. El uso indebido de esta plataforma está sujeto a las políticas internas de la compañía.</p>
    </div>
  </main>

  <script src="js/app.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/admin.js" defer></script>
</body>
</html>
